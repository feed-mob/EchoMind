<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Create/Edit Idea - Innovation Group</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(19, 127, 236, 0.2); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(19, 127, 236, 0.4); }
        .modal-overlay { background-color: rgba(16, 25, 34, 0.85); backdrop-filter: blur(4px); }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display min-h-screen flex overflow-hidden">
<aside class="w-16 flex flex-col items-center py-6 bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 z-10">
<div class="w-10 h-10 bg-primary rounded-xl flex items-center justify-center mb-8">
<span class="material-icons text-white">bolt</span>
</div>
<nav class="flex flex-col gap-6 flex-1">
<button class="p-2 text-primary bg-primary/10 rounded-lg"><span class="material-icons">dashboard</span></button>
<button class="p-2 text-slate-400 hover:text-primary transition-colors"><span class="material-icons">lightbulb</span></button>
<button class="p-2 text-slate-400 hover:text-primary transition-colors"><span class="material-icons">groups</span></button>
<button class="p-2 text-slate-400 hover:text-primary transition-colors"><span class="material-icons">assessment</span></button>
</nav>
<div class="flex flex-col gap-6">
<button class="p-2 text-slate-400 hover:text-primary transition-colors"><span class="material-icons">settings</span></button>
<img alt="User Profile" class="w-8 h-8 rounded-full border border-slate-700" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAJi6A1yBRxEMdu-fYyHrHhUSzMv08dPt09VTlzwXHozS1ffTGV0PxxWmYT_jw8Fq0P3HMfQYTsAeNaaBYgb9So72Dabp8CdPEn5-dYbxVxYPtDu5CpHzqYjSO--BmTQ6QJ7INMlx7g1_Bp3pSvfdo1OSKS949Nd4_KxFnUftB51Jrk2BDd3Bj-GX0zspY6UmGg63bI9hADCogum1nuBGOvNR9gFY9hnGTvSl1-a0xVuc6mPSFX50czQhqhj4M5P6uYxQS5nVj9Gug"/>
</div>
</aside>
<main class="flex-1 flex flex-col h-screen overflow-hidden">
<header class="h-16 px-6 border-b border-slate-200 dark:border-slate-800 flex items-center justify-between bg-white dark:bg-background-dark">
<div class="flex items-center gap-4 flex-1 max-w-2xl">
<div class="relative flex-1 opacity-50">
<span class="material-icons absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm">search</span>
<input class="w-full pl-10 pr-4 py-2 bg-slate-100 dark:bg-slate-800 border-none rounded-lg text-sm" disabled="" placeholder="Search ideas..." type="text"/>
</div>
</div>
<div class="flex items-center gap-6 opacity-50">
<button class="bg-primary text-white px-4 py-2 rounded-lg text-sm font-semibold flex items-center gap-2">
<span class="material-icons text-sm">add</span> New Idea
                </button>
</div>
</header>
<div class="flex-1 flex overflow-hidden">
<div class="flex-1 overflow-y-auto p-6 opacity-40 grayscale-[0.5]">
<h1 class="text-xl font-bold mb-4">Innovation Group <span class="text-slate-400 font-normal ml-2">24 Ideas</span></h1>
<div class="space-y-3">
<div class="p-4 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl">
<div class="h-4 w-2/3 bg-slate-200 dark:bg-slate-800 rounded mb-4"></div>
<div class="h-3 w-1/2 bg-slate-100 dark:bg-slate-800 rounded"></div>
</div>
<div class="p-4 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl">
<div class="h-4 w-3/4 bg-slate-200 dark:bg-slate-800 rounded mb-4"></div>
<div class="h-3 w-1/3 bg-slate-100 dark:bg-slate-800 rounded"></div>
</div>
</div>
</div>
</div>
</main>
<div class="fixed inset-0 z-[100] flex items-center justify-center p-4 modal-overlay">
<div class="bg-white dark:bg-slate-900 w-full max-w-4xl max-h-[90vh] rounded-2xl shadow-2xl flex flex-col overflow-hidden border border-slate-200 dark:border-slate-800">
<div class="px-8 py-6 border-b border-slate-200 dark:border-slate-800 flex items-center justify-between bg-slate-50/50 dark:bg-slate-900/50">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-lg bg-primary/10 flex items-center justify-center text-primary">
<span class="material-symbols-outlined">lightbulb</span>
</div>
<div>
<h2 class="text-xl font-bold">New Idea</h2>
<p class="text-xs text-slate-500 font-medium uppercase tracking-wider">Innovation Group Workshop</p>
</div>
</div>
<button class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full text-slate-400 transition-colors">
<span class="material-icons">close</span>
</button>
</div>
<div class="flex-1 overflow-y-auto custom-scrollbar p-8">
<form class="space-y-8">
<div class="space-y-2">
<label class="text-sm font-semibold text-slate-400 uppercase tracking-widest ml-1" for="idea-title">Title</label>
<input class="w-full px-0 py-2 bg-transparent border-t-0 border-x-0 border-b-2 border-slate-200 dark:border-slate-800 focus:border-primary focus:ring-0 text-2xl font-bold placeholder:text-slate-300 dark:placeholder:text-slate-700 transition-all" id="idea-title" placeholder="Enter a descriptive title..." type="text"/>
</div>
<div class="space-y-2">
<label class="text-sm font-semibold text-slate-400 uppercase tracking-widest ml-1">Content Description</label>
<div class="border border-slate-200 dark:border-slate-800 rounded-xl overflow-hidden focus-within:ring-2 focus-within:ring-primary/20 transition-all">
<div class="flex items-center gap-1 p-2 bg-slate-50 dark:bg-slate-800/50 border-b border-slate-200 dark:border-slate-800">
<button class="p-1.5 hover:bg-slate-200 dark:hover:bg-slate-700 rounded transition-colors text-slate-500" type="button"><span class="material-symbols-outlined text-xl">format_bold</span></button>
<button class="p-1.5 hover:bg-slate-200 dark:hover:bg-slate-700 rounded transition-colors text-slate-500" type="button"><span class="material-symbols-outlined text-xl">format_italic</span></button>
<button class="p-1.5 hover:bg-slate-200 dark:hover:bg-slate-700 rounded transition-colors text-slate-500" type="button"><span class="material-symbols-outlined text-xl">format_list_bulleted</span></button>
<div class="w-px h-4 bg-slate-200 dark:border-slate-700 mx-1"></div>
<button class="p-1.5 hover:bg-slate-200 dark:hover:bg-slate-700 rounded transition-colors text-slate-500" type="button"><span class="material-symbols-outlined text-xl">code</span></button>
<button class="p-1.5 hover:bg-slate-200 dark:hover:bg-slate-700 rounded transition-colors text-slate-500" type="button"><span class="material-symbols-outlined text-xl">link</span></button>
<div class="w-px h-4 bg-slate-200 dark:border-slate-700 mx-1"></div>
<span class="text-[10px] font-bold text-slate-400 px-2 uppercase tracking-tight">Markdown Supported</span>
</div>
<textarea class="w-full p-4 bg-transparent border-none focus:ring-0 min-h-[240px] text-slate-700 dark:text-slate-300 placeholder:text-slate-400" placeholder="Describe your idea in detail..."></textarea>
</div>
</div>
<div class="space-y-3">
<label class="text-sm font-semibold text-slate-400 uppercase tracking-widest ml-1">Linked Goals</label>
<div class="flex flex-wrap gap-2 p-4 border border-dashed border-slate-200 dark:border-slate-800 rounded-xl bg-slate-50/30 dark:bg-slate-800/20">
<div class="flex items-center gap-1.5 px-3 py-1.5 bg-primary/10 text-primary text-xs font-semibold rounded-full border border-primary/20">
<span class="w-1.5 h-1.5 bg-primary rounded-full"></span> 
                                Q4 Retention
                                <button class="ml-1 hover:text-primary/70 transition-colors" type="button"><span class="material-icons text-[14px]">close</span></button>
</div>
<div class="flex items-center gap-1.5 px-3 py-1.5 bg-primary/10 text-primary text-xs font-semibold rounded-full border border-primary/20">
<span class="w-1.5 h-1.5 bg-primary rounded-full"></span> 
                                AI/ML Strategy
                                <button class="ml-1 hover:text-primary/70 transition-colors" type="button"><span class="material-icons text-[14px]">close</span></button>
</div>
<button class="px-3 py-1.5 rounded-full border border-slate-200 dark:border-slate-800 text-slate-400 hover:text-primary hover:border-primary transition-all text-xs font-medium flex items-center gap-1" type="button">
<span class="material-icons text-sm">add</span> Add Goal
                            </button>
</div>
</div>
</form>
</div>
<div class="px-8 py-6 border-t border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-900/80 flex items-center justify-between">
<div class="flex items-center gap-3">
<button class="px-6 py-2.5 rounded-xl text-sm font-semibold text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-all">
                        Save Draft
                    </button>
<button class="px-8 py-2.5 rounded-xl text-sm font-bold bg-primary text-white hover:bg-primary/90 shadow-lg shadow-primary/20 transition-all flex items-center gap-2">
                        Submit Idea <span class="material-symbols-outlined text-sm">send</span>
</button>
</div>
</div>
</div>
</div>

</body></html>
