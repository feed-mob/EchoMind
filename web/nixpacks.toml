[phases.setup]
nixPkgs = ["curl", "unzip", "nodejs_22"]
cmds = ["curl -fsSL https://bun.sh/install | bash -s -- bun-v1.3.8"]

[phases.install]
cmds = ["/root/.bun/bin/bun install --frozen-lockfile"]

[phases.build]
cmds = ["/root/.bun/bin/bun run build"]

[start]
cmd = "/root/.bun/bin/bun run start"
